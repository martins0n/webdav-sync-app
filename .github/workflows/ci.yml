name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Start local WebDAV container
        run: |
          docker run -d --name wsa-dav -p 8081:80 \
            -e USERNAME=test -e PASSWORD=test \
            bytemark/webdav
          for i in $(seq 1 30); do
            if curl -sf -u test:test http://localhost:8081/ > /dev/null; then
              echo "WebDAV is up"; exit 0
            fi
            sleep 1
          done
          echo "WebDAV did not become ready in 30s" >&2
          docker logs wsa-dav || true
          exit 1

      - name: Configure rclone WebDAV remote
        run: |
          mkdir -p ~/.config/rclone
          rclone config create dav webdav \
            url=http://localhost:8081 \
            vendor=other \
            user=test \
            pass="$(rclone obscure test)"
          rclone lsd dav: || rclone mkdir dav:probe

      - name: npm install
        run: npm ci

      - name: svelte-check
        run: npm run check

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked
